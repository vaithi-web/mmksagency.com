<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Clock face -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Hour markers -->
  <circle cx="50" cy="24" r="2" fill="currentColor"/>
  <circle cx="76" cy="50" r="2" fill="currentColor"/>
  <circle cx="50" cy="76" r="2" fill="currentColor"/>
  <circle cx="24" cy="50" r="2" fill="currentColor"/>
  <!-- Hour hand -->
  <line x1="50" y1="50" x2="50" y2="38" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="50" y1="50" x2="62" y2="50" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="currentColor"/>
</svg>