<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Balance scale -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <!-- Central pivot -->
    <line x1="50" y1="35" x2="50" y2="50"/>
    <circle cx="50" cy="50" r="4" fill="currentColor"/>
    
    <!-- Balance beam -->
    <line x1="25" y1="50" x2="75" y2="50" stroke-width="2.5"/>
    
    <!-- Left pan (Work) -->
    <rect x="20" y="52" width="18" height="12" rx="2"/>
    <path d="M 23 52 L 23 48 M 29 52 L 29 48 M 35 52 L 35 48" stroke-width="1.5"/>
    
    <!-- Right pan (Life) -->
    <rect x="62" y="52" width="18" height="12" rx="2"/>
    <path d="M 65 52 L 65 48 M 71 52 L 71 48 M 77 52 L 77 48" stroke-width="1.5"/>
  </g>
  
  <!-- Balance indicator (checkmark style) -->
  <g fill="currentColor" opacity="0.6">
    <circle cx="50" cy="30" r="6"/>
    <path d="M 47 30 L 49 32 L 53 28" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>