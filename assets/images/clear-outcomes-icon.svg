<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bar chart -->
  <g fill="currentColor" opacity="0.8">
    <rect x="18" y="50" width="14" height="28" rx="2"/>
    <rect x="36" y="35" width="14" height="43" rx="2"/>
    <rect x="54" y="20" width="14" height="58" rx="2"/>
    <rect x="72" y="40" width="14" height="38" rx="2"/>
  </g>
  
  <!-- Upward trend arrow -->
  <path d="M 15 65 Q 40 45 75 25" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="75,25 70,28 73,35" fill="currentColor"/>
  
  <!-- Target dot on highest bar -->
  <circle cx="61" cy="20" r="3" fill="currentColor" stroke="currentColor" stroke-width="1"/>
  <circle cx="61" cy="20" r="7" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
</svg>