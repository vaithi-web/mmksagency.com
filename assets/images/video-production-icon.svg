<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Camera -->
  <rect x="15" y="25" width="70" height="50" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
  
  <!-- Lens -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="14" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  
  <!-- Play button in center -->
  <polygon points="45,45 45,55 58,50" fill="currentColor"/>
  
  <!-- Film reel top -->
  <circle cx="20" cy="20" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="20" cy="20" r="4" fill="none" stroke="currentColor" stroke-width="0.5"/>
  
  <!-- Film reel bottom -->
  <circle cx="80" cy="80" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="80" cy="80" r="4" fill="none" stroke="currentColor" stroke-width="0.5"/>
  
  <!-- Record light -->
  <circle cx="68" cy="28" r="3" fill="currentColor" opacity="0.7"/>
</svg>