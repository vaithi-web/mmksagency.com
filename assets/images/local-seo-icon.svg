<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Map -->
  <rect x="15" y="15" width="70" height="60" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
  
  <!-- Map lines -->
  <path d="M 20 40 Q 50 25 80 40" stroke="currentColor" stroke-width="1.5" fill="none"/>
  
  <!-- Location pins -->
  <circle cx="35" cy="35" r="4" fill="currentColor" stroke="currentColor" stroke-width="1"/>
  <circle cx="65" cy="50" r="4" fill="currentColor" stroke="currentColor" stroke-width="1"/>
  
  <!-- Pin markers -->
  <path d="M 35 35 L 32 42" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <path d="M 65 50 L 62 57" stroke="currentColor" stroke-width="1.5" fill="none"/>
  
  <!-- Compass rose -->
  <g stroke="currentColor" stroke-width="1" fill="none">
    <circle cx="50" cy="65" r="8"/>
    <line x1="50" y1="60" x2="50" y2="70"/>
    <line x1="45" y1="65" x2="55" y2="65"/>
    <polygon points="50,58 52,62 48,62" fill="currentColor"/>
  </g>
</svg>