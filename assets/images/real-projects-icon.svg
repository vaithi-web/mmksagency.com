<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Project board -->
  <rect x="15" y="20" width="70" height="60" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
  
  <!-- Column dividers -->
  <line x1="35" y1="20" x2="35" y2="80" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="55" y1="20" x2="55" y2="80" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  
  <!-- Task cards -->
  <g fill="currentColor" opacity="0.7">
    <rect x="20" y="28" width="12" height="15" rx="2"/>
    <rect x="20" y="48" width="12" height="20" rx="2"/>
    
    <rect x="40" y="30" width="12" height="12" rx="2"/>
    <rect x="40" y="50" width="12" height="18" rx="2"/>
    
    <rect x="60" y="28" width="12" height="18" rx="2"/>
    <rect x="60" y="52" width="12" height="15" rx="2"/>
  </g>
  
  <!-- Progress indicator -->
  <circle cx="78" cy="25" r="5" fill="currentColor" opacity="0.5" stroke="currentColor" stroke-width="1"/>
</svg>