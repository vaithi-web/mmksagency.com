<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Upward trending chart -->
  <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <!-- Chart line -->
    <path d="M 20 70 L 35 55 L 50 40 L 65 25 L 80 20"/>
    
    <!-- Data points -->
    <circle cx="20" cy="70" r="3" fill="currentColor"/>
    <circle cx="35" cy="55" r="3" fill="currentColor"/>
    <circle cx="50" cy="40" r="3" fill="currentColor"/>
    <circle cx="65" cy="25" r="3" fill="currentColor"/>
    <circle cx="80" cy="20" r="3" fill="currentColor"/>
  </g>
  
  <!-- Upward arrow -->
  <path d="M 75 35 L 80 20 L 85 35" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Growth indicator circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2" stroke-dasharray="5,5"/>
</svg>